<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作日志</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
    background: #f5f6f8;
    padding: 20px;
    color: #333;
  }
  .container { max-width: 1600px; margin: 0 auto; }
  h1 {
    font-size: 22px;
    margin-bottom: 16px;
    color: #2c5f2d;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .toolbar input[type="date"] {
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
  }
  .toolbar button {
    padding: 7px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: opacity .2s;
  }
  .toolbar button:hover { opacity: .85; }
  .btn-primary { background: #2c5f2d; color: #fff; }
  .btn-secondary { background: #6c757d; color: #fff; }
  .btn-export { background: #198754; color: #fff; }
  .btn-danger { background: #dc3545; color: #fff; }

  .parse-box {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .parse-box label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .parse-box textarea {
    width: 100%;
    min-height: 60px;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
  }
  .parse-box .hint {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }

  .table-wrap {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1200px;
  }
  thead th {
    background: #c6e0b4;
    color: #2c5f2d;
    padding: 10px 8px;
    border: 1px solid #a9d18e;
    text-align: center;
    font-weight: bold;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  tbody td {
    border: 1px solid #d9d9d9;
    padding: 6px 8px;
    text-align: center;
    vertical-align: middle;
    background: #fff;
  }
  tbody tr:nth-child(even) td { background: #f9f9f9; }
  tbody tr:hover td { background: #e8f5e9; }
  td.editable {
    cursor: text;
    min-width: 80px;
  }
  td.editable:focus {
    outline: 2px solid #2c5f2d;
    background: #fffde7;
  }
  td.content-cell {
    text-align: left;
    min-width: 300px;
    max-width: 500px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  td .del-btn {
    color: #dc3545;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  td .del-btn:hover { background: #fce4e4; }

  .empty-tip {
    text-align: center;
    padding: 40px;
    color: #888;
    font-size: 14px;
  }

  .archive-section {
    margin-top: 20px;
  }
  .archive-section h2 {
    font-size: 18px;
    color: #2c5f2d;
    margin-bottom: 10px;
  }
  .archive-list {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .archive-tag {
    background: #e8f5e9;
    color: #2c5f2d;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #a5d6a7;
  }
  .archive-tag:hover { background: #c8e6c9; }
  .archive-tag.active { background: #2c5f2d; color: #fff; border-color: #2c5f2d; }

  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    width: 90%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .modal h3 { margin-bottom: 12px; font-size: 16px; }
  .modal-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }
  .modal-row label {
    width: 90px;
    font-size: 13px;
    text-align: right;
    flex-shrink: 0;
  }
  .modal-row input, .modal-row select, .modal-row textarea {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  .modal-row textarea { min-height: 60px; resize: vertical; }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>📝 工作日志</h1>

  <div class="toolbar">
    <input type="date" id="logDate">
    <button class="btn-primary" onclick="addEmptyRow()">➕ 添加空行</button>
    <button class="btn-export" onclick="exportExcel()">📥 导出Excel</button>
    <button class="btn-secondary" onclick="archiveCurrent()">📦 归档本月</button>
    <button class="btn-danger" onclick="clearAll()">🗑️ 清空当前</button>
  </div>

  <div class="parse-box">
    <label for="parseInput">🧠 自然语言解析（粘贴文本自动拆分）</label>
    <textarea id="parseInput" placeholder="例如：XX证券，XX部/xx负责人，XX总151XXXX2890，现场拜访/微信/电话，交流相关事宜。"></textarea>
    <div class="hint">支持格式：客户名称 + 职位 + 姓名 + 手机号 + 沟通内容。自动判断沟通方式（现场拜访/电话/微信）。</div>
    <div style="margin-top:8px;">
      <button class="btn-primary" onclick="parseAndAdd()">✨ 解析并添加</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="logTable">
      <thead>
        <tr>
          <th style="width:40px;">操作</th>
          <th>日期</th>
          <th>分公司</th>
          <th>姓名</th>
          <th>客户名称</th>
          <th>客户类型</th>
          <th>客户联系人</th>
          <th>客户联系人职位</th>
          <th>手机</th>
          <th>现场拜访</th>
          <th>沟通方式</th>
          <th style="min-width:300px;">沟通内容</th>
        </tr>
      </thead>
      <tbody id="logBody">
        <tr class="empty-tip"><td colspan="12">暂无记录，请添加或解析数据</td></tr>
      </tbody>
    </table>
  </div>

  <div class="archive-section">
    <h2>📁 历史归档</h2>
    <div class="archive-list" id="archiveList">
      <span style="color:#888;font-size:13px;">暂无归档</span>
    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>编辑记录</h3>
    <div class="modal-row"><label>日期</label><input type="date" id="m_date"></div>
    <div class="modal-row"><label>分公司</label><input type="text" id="m_branch" placeholder="贵州分公司"></div>
    <div class="modal-row"><label>姓名</label><input type="text" id="m_name" placeholder="李艳杰"></div>
    <div class="modal-row"><label>客户名称</label><input type="text" id="m_client"></div>
    <div class="modal-row"><label>客户类型</label>
      <select id="m_type">
        <option value="">--请选择--</option>
        <option value="审计">审计</option>
        <option value="券商">券商</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="modal-row"><label>客户联系人</label><input type="text" id="m_contact"></div>
    <div class="modal-row"><label>联系人职位</label><input type="text" id="m_position"></div>
    <div class="modal-row"><label>手机</label><input type="text" id="m_phone"></div>
    <div class="modal-row"><label>现场拜访</label>
      <select id="m_visit">
        <option value="否">否</option>
        <option value="是">是</option>
      </select>
    </div>
    <div class="modal-row"><label>沟通方式</label>
      <select id="m_method">
        <option value="电话">电话</option>
        <option value="微信">微信</option>
        <option value="现场拜访">现场拜访</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="modal-row"><label>沟通内容</label><textarea id="m_content"></textarea></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ========== 数据存储 ========== */
const STORAGE_KEY = 'worklog_data';
const ARCHIVE_KEY = 'worklog_archive';
let currentData = [];
let editingIndex = -1;

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) currentData = JSON.parse(raw);
  renderTable();
  renderArchives();
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(currentData));
}
function getArchives() {
  const raw = localStorage.getItem(ARCHIVE_KEY);
  return raw ? JSON.parse(raw) : {};
}
function setArchives(obj) {
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(obj));
}

/* ========== 初始化 ========== */
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('logDate').value = formatDate(today);
  loadData();
});

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDate(str) {
  if (!str) return null;
  const m = str.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  const m2 = str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m2) return str;
  return null;
}

/* ========== 解析逻辑 ========== */
function parseText(text) {
  // 1. 提取手机号
  const phoneMatch = text.match(/(\d{11})/);
  const phone = phoneMatch ? phoneMatch[1] : '';
  let remaining = text.replace(phone, '').trim();

  // 2. 判断沟通方式
  let method = '电话';
  let visit = '否';
  if (remaining.includes('现场拜访')) {
    method = '现场拜访';
    visit = '是';
  } else if (remaining.includes('微信')) {
    method = '微信';
  } else if (remaining.includes('电话')) {
    method = '电话';
  }

  // 3. 提取联系人姓名（X总、X经理、X老师 等）
  let contact = '';
  let position = '';
  const namePatterns = [
    /([\u4e00-\u9fa5]{1,3}总)/,
    /([\u4e00-\u9fa5]{1,3}经理)/,
    /([\u4e00-\u9fa5]{1,3}老师)/,
    /([\u4e00-\u9fa5]{1,3}负责人)/,
    /([\u4e00-\u9fa5]{1,3}合伙人)/,
    /([\u4e00-\u9fa5]{1,3}投行人)/,
    /([\u4e00-\u9fa5]{1,4})/ // fallback
  ];

  // 先尝试找 "X总" 这种常见称呼
  const zongMatch = remaining.match(/([\u4e00-\u9fa5]{1,3}总)/);
  if (zongMatch) {
    contact = zongMatch[1];
    remaining = remaining.replace(contact, '').trim();
  }

  // 4. 提取职位（在姓名前后）
  const posKeywords = ['西南地区负责人','合伙人','总经理','项目负责人','对接事务所负责人','投行','审计','券商','负责人','经理'];
  for (const kw of posKeywords) {
    if (remaining.includes(kw)) {
      position = kw;
      remaining = remaining.replace(kw, '').trim();
      break;
    }
  }

  // 5. 提取客户名称（通常是开头的一段）
  let client = '';
  // 尝试匹配 "XX证券"、"XX会所"、"XX资产" 等
  const clientPatterns = [
    /([\u4e00-\u9fa5]+证券)/,
    /([\u4e00-\u9fa5]+会所)/,
    /([\u4e00-\u9fa5]+资产)/,
    /([\u4e00-\u9fa5]+事务所)/,
    /([\u4e00-\u9fa5]+公司)/,
    /([\u4e00-\u9fa5]{2,6})/ // fallback: 前2-6个字
  ];
  for (const p of clientPatterns) {
    const m = remaining.match(p);
    if (m) {
      client = m[1];
      remaining = remaining.replace(client, '').trim();
      break;
    }
  }

  // 6. 剩余内容作为沟通内容
  let content = remaining.replace(/^[，,、\s]+/, '').trim();
  // 清理开头可能残留的 "联系"、"沟通" 等词
  content = content.replace(/^(联系|沟通|和|与)+/, '').trim();

  // 7. 判断客户类型
  let type = '其他';
  if (client.includes('证券')) type = '券商';
  else if (client.includes('会所') || client.includes('事务所')) type = '审计';

  return {
    date: document.getElementById('logDate').value,
    branch: '贵州分公司',
    name: '李艳杰',
    client,
    type,
    contact,
    position,
    phone,
    visit,
    method,
    content
  };
}

function parseAndAdd() {
  const input = document.getElementById('parseInput').value.trim();
  if (!input) { showToast('请输入要解析的文本'); return; }

  // 支持多条，用换行分隔
  const lines = input.split(/\n+/).filter(l => l.trim());
  let added = 0;
  for (const line of lines) {
    const parsed = parseText(line.trim());
    if (parsed.client || parsed.contact || parsed.content) {
      currentData.push(parsed);
      added++;
    }
  }
  if (added > 0) {
    saveData();
    renderTable();
    document.getElementById('parseInput').value = '';
    showToast(`成功添加 ${added} 条记录`);
  } else {
    showToast('未能解析出有效数据，请检查格式');
  }
}

/* ========== 表格渲染 ========== */
function renderTable() {
  const tbody = document.getElementById('logBody');
  if (currentData.length === 0) {
    tbody.innerHTML = '<tr class="empty-tip"><td colspan="12">暂无记录，请添加或解析数据</td></tr>';
    return;
  }
  tbody.innerHTML = currentData.map((row, i) => `
    <tr data-index="${i}">
      <td><span class="del-btn" onclick="deleteRow(${i})" title="删除">×</span></td>
      <td class="editable" onclick="editCell(${i},'date')">${esc(row.date)}</td>
      <td class="editable" onclick="editCell(${i},'branch')">${esc(row.branch)}</td>
      <td class="editable" onclick="editCell(${i},'name')">${esc(row.name)}</td>
      <td class="editable" onclick="editCell(${i},'client')">${esc(row.client)}</td>
      <td class="editable" onclick="editCell(${i},'type')">${esc(row.type)}</td>
      <td class="editable" onclick="editCell(${i},'contact')">${esc(row.contact)}</td>
      <td class="editable" onclick="editCell(${i},'position')">${esc(row.position)}</td>
      <td class="editable" onclick="editCell(${i},'phone')">${esc(row.phone)}</td>
      <td class="editable" onclick="editCell(${i},'visit')">${esc(row.visit)}</td>
      <td class="editable" onclick="editCell(${i},'method')">${esc(row.method)}</td>
      <td class="editable content-cell" onclick="editCell(${i},'content')">${esc(row.content)}</td>
    </tr>
  `).join('');
}
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ========== 行内编辑 ========== */
function editCell(index, field) {
  editingIndex = index;
  const row = currentData[index];
  document.getElementById('m_date').value = row.date || '';
  document.getElementById('m_branch').value = row.branch || '';
  document.getElementById('m_name').value = row.name || '';
  document.getElementById('m_client').value = row.client || '';
  document.getElementById('m_type').value = row.type || '';
  document.getElementById('m_contact').value = row.contact || '';
  document.getElementById('m_position').value = row.position || '';
  document.getElementById('m_phone').value = row.phone || '';
  document.getElementById('m_visit').value = row.visit || '否';
  document.getElementById('m_method').value = row.method || '电话';
  document.getElementById('m_content').value = row.content || '';
  document.getElementById('editModal').classList.add('show');
}
function closeModal() {
  document.getElementById('editModal').classList.remove('show');
  editingIndex = -1;
}
function saveModal() {
  if (editingIndex < 0) return;
  currentData[editingIndex] = {
    date: document.getElementById('m_date').value,
    branch: document.getElementById('m_branch').value,
    name: document.getElementById('m_name').value,
    client: document.getElementById('m_client').value,
    type: document.getElementById('m_type').value,
    contact: document.getElementById('m_contact').value,
    position: document.getElementById('m_position').value,
    phone: document.getElementById('m_phone').value,
    visit: document.getElementById('m_visit').value,
    method: document.getElementById('m_method').value,
    content: document.getElementById('m_content').value,
  };
  saveData();
  renderTable();
  closeModal();
  showToast('保存成功');
}

/* ========== 增删 ========== */
function addEmptyRow() {
  currentData.push({
    date: document.getElementById('logDate').value,
    branch: '贵州分公司',
    name: '李艳杰',
    client: '',
    type: '',
    contact: '',
    position: '',
    phone: '',
    visit: '否',
    method: '电话',
    content: ''
  });
  saveData();
  renderTable();
  showToast('已添加空行');
}
function deleteRow(index) {
  if (!confirm('确定删除这条记录吗？')) return;
  currentData.splice(index, 1);
  saveData();
  renderTable();
  showToast('已删除');
}
function clearAll() {
  if (!confirm('确定清空所有当前记录吗？（可提前归档保存）')) return;
  currentData = [];
  saveData();
  renderTable();
  showToast('已清空');
}

/* ========== 归档 ========== */
function archiveCurrent() {
  if (currentData.length === 0) { showToast('当前无数据可归档'); return; }
  const months = [...new Set(currentData.map(r => r.date?.slice(0,7)).filter(Boolean))];
  const month = months.length === 1 ? months[0] : new Date().toISOString().slice(0,7);
  const archives = getArchives();
  if (!archives[month]) archives[month] = [];
  archives[month] = archives[month].concat(currentData);
  setArchives(archives);
  currentData = [];
  saveData();
  renderTable();
  renderArchives();
  showToast(`已归档到 ${month}`);
}
function renderArchives() {
  const archives = getArchives();
  const list = document.getElementById('archiveList');
  const keys = Object.keys(archives).sort().reverse();
  if (keys.length === 0) {
    list.innerHTML = '<span style="color:#888;font-size:13px;">暂无归档</span>';
    return;
  }
  list.innerHTML = keys.map(k => {
    const count = archives[k].length;
    return `<span class="archive-tag" onclick="loadArchive('${k}')">${k} (${count}条)</span>`;
  }).join('');
}
function loadArchive(month) {
  const archives = getArchives();
  if (!archives[month]) return;
  if (currentData.length > 0 && !confirm('当前有未保存数据，加载归档将覆盖，是否继续？')) return;
  currentData = JSON.parse(JSON.stringify(archives[month]));
  saveData();
  renderTable();
  showToast(`已加载 ${month} 归档数据`);
}

/* ========== Excel 导出 ========== */
function exportExcel() {
  if (currentData.length === 0) { showToast('无数据可导出'); return; }
  const headers = ['日期','分公司','姓名','客户名称','客户类型','客户联系人','客户联系人职位','手机','现场拜访','沟通方式','沟通内容'];
  const rows = currentData.map(r => [
    r.date, r.branch, r.name, r.client, r.type, r.contact, r.position, r.phone, r.visit, r.method, r.content
  ]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  // 设置列宽
  ws['!cols'] = [
    {wch:12},{wch:12},{wch:8},{wch:16},{wch:10},
    {wch:12},{wch:16},{wch:14},{wch:10},{wch:10},{wch:60}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '工作日志');
  const month = currentData[0]?.date?.slice(0,7) || 'export';
  XLSX.writeFile(wb, `工作日志_${month}.xlsx`);
  showToast('Excel 导出成功');
}

/* ========== 工具 ========== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 点击遮罩关闭弹窗
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeModal();
});
</script>
</body>
